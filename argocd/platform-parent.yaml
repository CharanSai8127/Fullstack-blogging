apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-parent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: platform-project

  source:
    repoURL: https://github.com/CharanSai8127/Fullstack-blogging
    targetRevision: main
    path: argocd/platform-apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

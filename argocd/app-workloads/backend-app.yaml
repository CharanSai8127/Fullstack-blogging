apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blog-backend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"  # 👈 ADDED
spec:
  project: application-project

  source:
    repoURL: https://github.com/CharanSai8127/Fullstack-blogging
    targetRevision: main
    path: k8s/backend

  destination:
    server: https://kubernetes.default.svc
    namespace: blog-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true


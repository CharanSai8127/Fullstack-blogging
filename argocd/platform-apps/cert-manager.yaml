apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"

spec:
  project: platform-project

  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.14.4
    helm:
      values: |
        installCRDs: false

        nodeSelector:
          role: platform

        tolerations:
          - key: platform
            operator: Equal
            value: "true"
            effect: NoSchedule

        webhook:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule

        cainjector:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  syncOptions:
    - CreateNamespace=true

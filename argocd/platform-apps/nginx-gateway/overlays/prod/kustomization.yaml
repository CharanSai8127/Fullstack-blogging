apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: nginx-gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nginx-gateway
      spec:
        template:
          spec:
            nodeSelector:
              role: platform
            tolerations:
              - key: platform
                operator: Equal
                value: "true"
                effect: NoSchedule

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ebs-csi-driver
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: platform-project

  source:
    repoURL: https://kubernetes-sigs.github.io/aws-ebs-csi-driver
    chart: aws-ebs-csi-driver
    targetRevision: 2.30.0
    helm:
      values: |
        controller:
          serviceAccount:
            create: false
            name: ebs-csi-controller

          nodeSelector:
            role: platform

          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule

        node:
          serviceAccount:
            create: true

          tolerations:
            - operator: Exists

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  syncOptions:
    - CreateNamespace=true

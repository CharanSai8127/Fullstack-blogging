apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  project: platform-project

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 55.5.0
    helm:
      values: |
        crds:
          enabled: false

        global:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule

        # ---------------- PROMETHEUS ----------------
        prometheus:
          prometheusSpec:
            replicas: 1
            shards: 1

            nodeSelector:
              role: platform
            tolerations:
              - key: platform
                operator: Equal
                value: "true"
                effect: NoSchedule

            resources:
              requests:
                cpu: 500m
                memory: 1Gi

            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: prometheus

            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: monitoring-storage
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 2Gi

        # ---------------- ALERTMANAGER ----------------
        alertmanager:
          alertmanagerSpec:
            replicas: 1

            nodeSelector:
              role: platform
            tolerations:
              - key: platform
                operator: Equal
                value: "true"
                effect: NoSchedule

            resources:
              requests:
                cpu: 200m
                memory: 512Mi

            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: alertmanager

            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: monitoring-storage
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 2Gi

        # ---------------- GRAFANA ----------------
        grafana:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule

          resources:
            requests:
              cpu: 200m
              memory: 512Mi

          persistence:
            enabled: true
            storageClassName: monitoring-storage
            size: 5Gi

        # ---------------- KUBE-STATE-METRICS ----------------
        kube-state-metrics:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule

        # ---------------- PROMETHEUS OPERATOR ----------------
        prometheusOperator:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule

        # ---------------- NODE EXPORTER ----------------
        nodeExporter:
          tolerations:
            - operator: Exists

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# argocd/platform-apps/kube-prometheus-stack.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  project: platform-project

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 55.5.0
    helm:
      values: |
        crds:
          enabled: false

        global:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule

        # ---- Prometheus ----
        prometheus:
          prometheusSpec:
            nodeSelector:
              role: platform
            tolerations:
              - key: platform
                operator: Equal
                value: "true"
                effect: NoSchedule
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: monitoring-storage  # <-- CHANGED from vault-storage
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 2Gi

        # ---- Alertmanager ----
        alertmanager:
          alertmanagerSpec:
            nodeSelector:
              role: platform
            tolerations:
              - key: platform
                operator: Equal
                value: "true"
                effect: NoSchedule
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: monitoring-storage  # <-- CHANGED from vault-storage
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 2Gi

        # ---- Grafana ----
        grafana:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule
          # Optional: if you want Grafana persistence too
          persistence:
            enabled: true
            storageClassName: monitoring-storage
            size: 5Gi

        # ---- Kube-State-Metrics ----
        kube-state-metrics:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule

        # ---- Prometheus Operator ----
        prometheusOperator:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule

        # ---- Node Exporter ----
        nodeExporter:
          tolerations:
            - operator: Exists  # Run on all nodes, including tainted ones

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true


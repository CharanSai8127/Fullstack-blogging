apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform-project
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 55.5.0
    helm:
      values: |
        crds:
          enabled: false
        global:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule
        prometheus:
          prometheusSpec:
            replicas: 1
            shards: 1
            retention: 6h
            nodeSelector:
              role: platform
            tolerations:
              - key: platform
                operator: Equal
                value: "true"
                effect: NoSchedule
            resources:
              requests:
                cpu: 300m
                memory: 1Gi
              limits:
                cpu: 1
                memory: 2Gi
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: prometheus
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: monitoring-storage
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 2Gi
        alertmanager:
          alertmanagerSpec:
            replicas: 1
            nodeSelector:
              role: platform
            tolerations:
              - key: platform
                operator: Equal
                value: "true"
                effect: NoSchedule
            resources:
              requests:
                cpu: 150m
                memory: 300Mi
              limits:
                cpu: 300m
                memory: 500Mi
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: alertmanager
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: monitoring-storage
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 2Gi
        grafana:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule
          resources:
            requests:
              cpu: 150m
              memory: 300Mi
            limits:
              cpu: 500m
              memory: 700Mi
          persistence:
            enabled: true
            storageClassName: monitoring-storage
            size: 5Gi
        kube-state-metrics:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule
          resources:
            requests:
              cpu: 100m
              memory: 150Mi
            limits:
              cpu: 200m
              memory: 300Mi
        prometheusOperator:
          nodeSelector:
            role: platform
          tolerations:
            - key: platform
              operator: Equal
              value: "true"
              effect: NoSchedule
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 300m
              memory: 400Mi
        nodeExporter:
          tolerations:
            - operator: Exists
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              cpu: 100m
              memory: 200Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true

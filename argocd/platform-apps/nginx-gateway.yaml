apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"

spec:
  project: platform-project

  source:
    repoURL: https://github.com/CharanSai8127/Fullstack-blogging
    targetRevision: main
    path: argocd/nginx-gateway/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

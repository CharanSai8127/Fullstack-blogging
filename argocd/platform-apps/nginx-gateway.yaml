apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: platform-project

  source:
    repoURL: https://helm.nginx.com/stable
    chart: nginx-gateway-fabric
    targetRevision: 1.2.0
    helm:
      values: |
        service:
          type: LoadBalancer

        nodeSelector:
          role: platform

        tolerations:
          - key: platform
            operator: Equal
            value: "true"
            effect: NoSchedule

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  syncOptions:
    - CreateNamespace=true

global:
  enabled: true
  tlsDisable: true

server:
  enabled: true
  logLevel: "info"
  updateStrategyType: RollingUpdate

  nodeSelector:
    role: platform

  tolerations:
    - key: platform
      operator: Equal
      value: "true"
      effect: NoSchedule

  ha:
    enabled: true
    replicas: 3

    raft:
      enabled: true
      setNodeId: true

      config: |
        ui = true
        cluster_name = "vault-raft-cluster"
        disable_mlock = true

        listener "tcp" {
          address         = "0.0.0.0:8200"
          cluster_address = "0.0.0.0:8201"
          tls_disable     = 1
        }

        seal "awskms" {
          region     = "ap-south-1"
          kms_key_id = "REPLACE_WITH_KMS_KEY"
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }

          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }

          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }

        service_registration "kubernetes" {}

  serviceAccount:
    create: false
    name: vault-sa

  dataStorage:
    enabled: true
    storageClass: vault-storage
    accessMode: ReadWriteOnce
    size: 1Gi

  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true"

  livenessProbe:
    enabled: true

  statefulSet:
    enabled: true
    podManagementPolicy: Parallel

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

ui:
  enabled: true
  serviceType: LoadBalancer

  nodeSelector:
    role: platform

  tolerations:
    - key: platform
      operator: Equal
      value: "true"
      effect: NoSchedule

injector:
  enabled: true

  nodeSelector:
    role: platform

  tolerations:
    - key: platform
      operator: Equal
      value: "true"
      effect: NoSchedule

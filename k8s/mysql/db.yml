# --- 1. Headless Service (Required for StatefulSet stable network) ---
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: blog-prod
  labels:
    app: mysql
spec:
  type: ClusterIP
  clusterIP: None            # 👈 CRITICAL: Makes it headless for StatefulSet
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306

---
# --- 2. Regular Service (For migration job & backend to connect via "mysql") ---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: blog-prod
  labels:
    app: mysql
  annotations:
    argocd.argoproj.io/sync-wave: "-2"  # Deploys with StatefulSet
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306

---
# --- 3. MySQL StatefulSet ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: blog-prod
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  serviceName: mysql-headless   # 👈 MUST match the headless service name above
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "mysql-role"
        vault.hashicorp.com/agent-inject-secret-db: "secret/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/db" -}}
          export MYSQL_ROOT_PASSWORD="{{ .Data.data.MYSQL_ROOT_PASSWORD }}"
          export MYSQL_USER="{{ .Data.data.MYSQL_USER }}"
          export MYSQL_PASSWORD="{{ .Data.data.MYSQL_PASSWORD }}"
          export MYSQL_DATABASE="{{ .Data.data.MYSQL_DATABASE }}"
          {{- end }}
    spec:
      serviceAccountName: vault-mysql
      nodeSelector:
        role: workload
      containers:
        - name: mysql
          image: mysql:8.0.36
          command: ["/bin/sh","-c"]
          args:
            - source /vault/secrets/db && exec docker-entrypoint.sh mysqld
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -u
                - root
                - -p${MYSQL_ROOT_PASSWORD}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -u
                - root
                - -p${MYSQL_ROOT_PASSWORD}
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: mysql-persistent-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: mysql-storage   # FIXED HERE
        resources:
          requests:
            storage: 2Gi

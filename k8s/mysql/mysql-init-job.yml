apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-migration-job
  namespace: blog-prod
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "2"  # After MySQL

spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300

  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "mysql-role"
        vault.hashicorp.com/agent-inject-secret-db: "secret/data/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/db" -}}
          export MYSQL_ROOT_PASSWORD="{{ .Data.data.MYSQL_ROOT_PASSWORD }}"
          export MYSQL_USER="{{ .Data.data.MYSQL_USER }}"
          export MYSQL_PASSWORD="{{ .Data.data.MYSQL_PASSWORD }}"
          export MYSQL_DATABASE="{{ .Data.data.MYSQL_DATABASE }}"
          export MYSQL_HOST="{{ .Data.data.MYSQL_HOST }}"
          export MYSQL_PORT="{{ .Data.data.MYSQL_PORT }}"
          {{- end }}

    spec:
      serviceAccountName: vault-mysql
      restartPolicy: OnFailure
      nodeSelector:
        role: workload

      containers:
        - name: mysql-migration
          image: mysql:8.0.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # No -u until secrets loaded

              echo "=== Loading Vault secrets ==="
              source /vault/secrets/db
              set -u  # Now safe

              echo "Secrets: DB=$MYSQL_DATABASE Host=$MYSQL_HOST"

              echo "=== Waiting MySQL (150s) ==="
              for i in $(seq 1 30); do
                if mysql -h "$MYSQL_HOST" -P "$MYSQL_PORT" \
                         -u root -p"$MYSQL_ROOT_PASSWORD" \
                         -e "SELECT 1" >/dev/null 2>&1; then
                  echo "✓ MySQL ready"
                  break
                fi
                echo "Waiting... ($i/30)"
                sleep 5
              done || exit 1

              echo "=== SAFE Migration ==="
              mysql -h "$MYSQL_HOST" -P "$MYSQL_PORT" \
                    -u root -p"$MYSQL_ROOT_PASSWORD" <<'EOSQL'
              CREATE DATABASE IF NOT EXISTS `${MYSQL_DATABASE}`;
              USE `${MYSQL_DATABASE}`;

              CREATE USER IF NOT EXISTS `'${MYSQL_USER}'`@'%' IDENTIFIED BY '${MYSQL_PASSWORD}';
              GRANT ALL PRIVILEGES ON `${MYSQL_DATABASE}`.* TO `'${MYSQL_USER}'`@'%';
              FLUSH PRIVILEGES;

              CREATE TABLE IF NOT EXISTS post (
                id BIGINT AUTO_INCREMENT PRIMARY KEY,
                title VARCHAR(255) NOT NULL,
                content TEXT,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
              );

              SET @col_exists = (
                SELECT COUNT(*) FROM INFORMATION_SCHEMA.COLUMNS
                WHERE TABLE_SCHEMA = '${MYSQL_DATABASE}'
                  AND TABLE_NAME = 'post' AND COLUMN_NAME = 'user_id'
              );

              SET @sql = IF(@col_exists = 0,
                'ALTER TABLE post ADD COLUMN user_id BIGINT NOT NULL DEFAULT 0',
                'SELECT "user_id exists"'
              );

              PREPARE stmt FROM @sql; EXECUTE stmt; DEALLOCATE PREPARE stmt;

              DESCRIBE post;
              EOSQL

              echo "✓ Migration done"
              mysql -h "$MYSQL_HOST" -P "$MYSQL_PORT" \
                    -u "$MYSQL_USER" -p"$MYSQL_PASSWORD" \
                    -D "$MYSQL_DATABASE" \
                    -e "SELECT 'Backend ready' as status;"

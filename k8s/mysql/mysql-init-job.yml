apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-migration-job
  namespace: blog-prod
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "-2"

spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300

  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "mysql-role"
        vault.hashicorp.com/agent-inject-secret-db: "secret/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/db" -}}
          export MYSQL_ROOT_PASSWORD="{{ .Data.data.MYSQL_ROOT_PASSWORD }}"
          export MYSQL_USER="{{ .Data.data.MYSQL_USER }}"
          export MYSQL_PASSWORD="{{ .Data.data.MYSQL_PASSWORD }}"
          export MYSQL_DATABASE="{{ .Data.data.MYSQL_DATABASE }}"
          export MYSQL_HOST="{{ .Data.data.MYSQL_HOST }}"
          export MYSQL_PORT="{{ .Data.data.MYSQL_PORT }}"
          {{- end }}

    spec:
      serviceAccountName: vault-mysql
      restartPolicy: OnFailure

      nodeSelector:
        role: workload

      containers:
        - name: mysql-migration
          image: mysql:8.0.36

          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail

              echo "=== Loading Vault secrets ==="
              source /vault/secrets/db

              echo "=== Waiting for MySQL ==="
              for i in $(seq 1 30); do
                if mysql -h "$MYSQL_HOST" -P "$MYSQL_PORT" \
                         -u root -p"$MYSQL_ROOT_PASSWORD" \
                         -e "SELECT 1" >/dev/null 2>&1; then
                  echo "✓ MySQL ready"
                  break
                fi
                echo "Waiting... ($i/30)"
                sleep 5
              done

              echo "=== Running FULL SCHEMA migration ==="

              mysql -h "$MYSQL_HOST" -P "$MYSQL_PORT" \
                    -u root -p"$MYSQL_ROOT_PASSWORD" <<EOSQL

              CREATE DATABASE IF NOT EXISTS \`${MYSQL_DATABASE}\`;
              USE \`${MYSQL_DATABASE}\`;

              CREATE USER IF NOT EXISTS '${MYSQL_USER}'@'%' IDENTIFIED BY '${MYSQL_PASSWORD}';
              GRANT ALL PRIVILEGES ON \`${MYSQL_DATABASE}\`.* TO '${MYSQL_USER}'@'%';
              FLUSH PRIVILEGES;

              CREATE TABLE IF NOT EXISTS users (
                id BIGINT AUTO_INCREMENT PRIMARY KEY,
                username VARCHAR(255) NOT NULL,
                password VARCHAR(255),
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );

              CREATE TABLE IF NOT EXISTS post (
                id BIGINT AUTO_INCREMENT PRIMARY KEY,
                title VARCHAR(255) NOT NULL,
                content TEXT,
                user_id BIGINT NOT NULL DEFAULT 0,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
              );

              EOSQL

              echo "=== Verifying schema ==="

              mysql -h "$MYSQL_HOST" -P "$MYSQL_PORT" \
                    -u root -p"$MYSQL_ROOT_PASSWORD" \
                    -D "$MYSQL_DATABASE" \
                    -e "SHOW TABLES;"

              echo "✅ Migration COMPLETED SUCCESSFULLY"

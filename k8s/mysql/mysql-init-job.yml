apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-migration-job
  namespace: blog-prod
  annotations:
    # ✅ CHANGE 1: Use "Sync" phase, NOT "PreSync"
    argocd.argoproj.io/hook: Sync               
    
    # ✅ CHANGE 2: Delete immediately after success
    argocd.argoproj.io/hook-delete-policy: HookSucceeded  
    
    # ✅ CHANGE 3: Wave "1" runs AFTER wave "-2" (StatefulSet)
    argocd.argoproj.io/sync-wave: "1"             

spec:
  backoffLimit: 3
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "mysql-role"
        vault.hashicorp.com/agent-inject-secret-db: "secret/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/db" -}}
          export MYSQL_ROOT_PASSWORD="{{ .Data.data.MYSQL_ROOT_PASSWORD }}"
          export MYSQL_USER="{{ .Data.data.MYSQL_USER }}"
          export MYSQL_PASSWORD="{{ .Data.data.MYSQL_PASSWORD }}"
          export MYSQL_DATABASE="{{ .Data.data.MYSQL_DATABASE }}"
          {{- end }}
    spec:
      serviceAccountName: vault-mysql
      nodeSelector:
        role: workload
      restartPolicy: OnFailure
      containers:
        - name: mysql-migration
          image: mysql:8.0.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              source /vault/secrets/db

              echo "Waiting for MySQL to be ready..."

              # Retry loop: Wait up to 5 minutes for MySQL
              for i in $(seq 1 60); do
                if mysql -h mysql.blog-prod.svc.cluster.local \
                      -u root \
                      -p"$MYSQL_ROOT_PASSWORD" \
                      -e "SELECT 1" > /dev/null 2>&1; then
                  echo "MySQL is ready!"
                  break
                fi
                echo "Waiting for MySQL... attempt $i/60"
                sleep 5
              done

              echo "Running migrations..."

              mysql -h mysql.blog-prod.svc.cluster.local \
                    -u root \
                    -p"$MYSQL_ROOT_PASSWORD" <<EOF
              CREATE DATABASE IF NOT EXISTS $MYSQL_DATABASE;
              CREATE USER IF NOT EXISTS '$MYSQL_USER'@'%' IDENTIFIED BY '$MYSQL_PASSWORD';
              GRANT ALL PRIVILEGES ON $MYSQL_DATABASE.* TO '$MYSQL_USER'@'%';
              FLUSH PRIVILEGES;
              EOF

              echo "Migration completed successfully."


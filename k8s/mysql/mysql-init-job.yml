apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-migration-job
  namespace: blog-prod
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "1"

spec:
  backoffLimit: 3

  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "mysql-role"
        vault.hashicorp.com/agent-inject-secret-db: "secret/data/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/db" -}}
          export MYSQL_ROOT_PASSWORD="{{ .Data.data.MYSQL_ROOT_PASSWORD }}"
          export MYSQL_USER="{{ .Data.data.MYSQL_USER }}"
          export MYSQL_PASSWORD="{{ .Data.data.MYSQL_PASSWORD }}"
          export MYSQL_DATABASE="{{ .Data.data.MYSQL_DATABASE }}"
          export MYSQL_HOST="{{ .Data.data.MYSQL_HOST }}"
          export MYSQL_PORT="{{ .Data.data.MYSQL_PORT }}"
          {{- end }}

    spec:
      serviceAccountName: vault-mysql
      restartPolicy: OnFailure
      nodeSelector:
        role: workload

      containers:
        - name: mysql-migration
          image: mysql:8.0.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              echo "Loading Vault secrets..."
              source /vault/secrets/db

              echo "Waiting for MySQL to be ready..."

              for i in $(seq 1 60); do
                if mysql -h "$MYSQL_HOST" \
                         -u root \
                         -p"$MYSQL_ROOT_PASSWORD" \
                         -e "SELECT 1" > /dev/null 2>&1; then
                  echo "MySQL is ready!"
                  break
                fi
                echo "Waiting for MySQL... attempt $i/60"
                sleep 5
              done

              echo "Running migrations..."

              mysql -h "$MYSQL_HOST" \
                    -u root \
                    -p"$MYSQL_ROOT_PASSWORD" <<EOF

              CREATE DATABASE IF NOT EXISTS $MYSQL_DATABASE;
              USE $MYSQL_DATABASE;

              CREATE USER IF NOT EXISTS '$MYSQL_USER'@'%' IDENTIFIED BY '$MYSQL_PASSWORD';
              GRANT ALL PRIVILEGES ON $MYSQL_DATABASE.* TO '$MYSQL_USER'@'%';
              FLUSH PRIVILEGES;

              CREATE TABLE IF NOT EXISTS post (
                id BIGINT AUTO_INCREMENT PRIMARY KEY,
                title VARCHAR(255),
                content TEXT,
                user_id BIGINT,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );

              EOF

              echo "Migration completed successfully."

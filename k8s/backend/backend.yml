apiVersion: v1
kind: Service
metadata:
  name: app-green
  namespace: blog-prod
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: app-green
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP


apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: blog-prod
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-green
  template:
    metadata:
      labels:
        app: app-green
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "db-backend-role"
        vault.hashicorp.com/agent-inject-secret-db: "secret/data/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/db" -}}
          export MYSQL_HOST="{{ .Data.data.MYSQL_HOST }}"
          export MYSQL_PORT="{{ .Data.data.MYSQL_PORT }}"
          export MYSQL_DATABASE="{{ .Data.data.MYSQL_DATABASE }}"
          export MYSQL_USER="{{ .Data.data.MYSQL_USER }}"
          export MYSQL_PASSWORD="{{ .Data.data.MYSQL_PASSWORD }}"
          {{- end }}
    spec:
      serviceAccountName: vault-app-green
      nodeSelector:
        role: workload
      containers:
      - name: app
        image: charansait372/devops-blog-new:1.7
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
        - |
          set -e
          
          echo "=== Loading Vault secrets ==="
          source /vault/secrets/db
          echo "DB Config: $MYSQL_HOST:$MYSQL_PORT / $MYSQL_DATABASE"
          
          echo "=== Waiting for MySQL service (using timeout) ==="
          # FIXED: Use timeout + bash cat instead of /dev/tcp (works universally)
          until timeout 2 bash -c "cat < /dev/null >/dev/tcp/mysql/3306"; do
            echo "Waiting for mysql:3306... (retrying)"
            sleep 3
          done
          
          echo "✅ MySQL TCP connection successful!"
          
          echo "=== Starting Spring Boot application ==="
          exec java \
            -Dspring.datasource.url="jdbc:mysql://mysql:3306/$MYSQL_DATABASE?useSSL=false&allowPublicKeyRetrieval=true" \
            -Dspring.datasource.username="$MYSQL_USER" \
            -Dspring.datasource.password="$MYSQL_PASSWORD" \
            -Dspring.jpa.hibernate.ddl-auto=validate \
            -jar /usr/src/app/app.jar
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1.5Gi"
        # Increased tolerances for Spring Boot startup
        startupProbe:
          httpGet:
            path: /
            port: 8080
          failureThreshold: 90    # 90 * 5s = 7.5 minutes
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30  # Give Spring more time
          periodSeconds: 10
          failureThreshold: 9
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 120 # 2 minutes after startup
          periodSeconds: 20
          failureThreshold: 3

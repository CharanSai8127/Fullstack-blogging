apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: blog-prod
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-green
  template:
    metadata:
      labels:
        app: app-green
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "db-backend-role"
        vault.hashicorp.com/agent-inject-secret-db: "secret/data/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secret/data/db" -}}
          export MYSQL_HOST="{{ .Data.data.MYSQL_HOST }}"
          export MYSQL_PORT="{{ .Data.data.MYSQL_PORT }}"
          export MYSQL_DATABASE="{{ .Data.data.MYSQL_DATABASE }}"
          export MYSQL_USER="{{ .Data.data.MYSQL_USER }}"
          export MYSQL_PASSWORD="{{ .Data.data.MYSQL_PASSWORD }}"
          {{- end }}
    spec:
      serviceAccountName: vault-app-green
      nodeSelector:
        role: workload
      containers:
      - name: app
        image: charansait372/devops-blog-new:1.7
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
        - |
          set -e
          
          echo "=== 1. Loading Vault secrets ==="
          source /vault/secrets/db
          echo "DB Config: mysql:3306 / $MYSQL_DATABASE"
          
          echo "=== 2. Starting Spring Boot (auto DB connect) ==="
          # Skip fragile TCP check - Spring Boot handles DB connection/retry
          exec java \
            -Dspring.datasource.url="jdbc:mysql://mysql:3306/$MYSQL_DATABASE?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&autoReconnect=true" \
            -Dspring.datasource.username="$MYSQL_USER" \
            -Dspring.datasource.password="$MYSQL_PASSWORD" \
            -Dspring.jpa.hibernate.ddl-auto=validate \
            -Dspring.jpa.show-sql=true \
            -jar /usr/src/app/app.jar
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1.5Gi"
        startupProbe:
          httpGet:
            path: /
            port: 8080
          failureThreshold: 120  # 10 minutes tolerance
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 10
          failureThreshold: 12
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 180
          periodSeconds: 30
          failureThreshold: 3

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: blog-prod
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-green

  template:
    metadata:
      labels:
        app: app-green
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "mysql-role"
        vault.hashicorp.com/agent-inject-secret-db: "secrets/data/db"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "secrets/data/db" -}}
          export MYSQL_HOST="{{ .Data.data.MYSQL_HOST }}"
          export MYSQL_PORT="{{ .Data.data.MYSQL_PORT }}"
          export MYSQL_DATABASE="{{ .Data.data.MYSQL_DATABASE }}"
          export MYSQL_USER="{{ .Data.data.MYSQL_USER }}"
          export MYSQL_PASSWORD="{{ .Data.data.MYSQL_PASSWORD }}"
          {{- end }}

    spec:
      serviceAccountName: vault-app-green
      nodeSelector:
        role: workload

      containers:
        - name: app
          image: charansait372/devops-blog-new:1.7
          imagePullPolicy: IfNotPresent

          command: ["sh","-c"]
          args:
            - |
              set -euo pipefail

              echo "=== Loading Vault secrets ==="
              source /vault/secrets/db

              echo "=== Waiting for MySQL ==="
              until mysql -h "$MYSQL_HOST" -P "$MYSQL_PORT" \
                     -u "$MYSQL_USER" -p"$MYSQL_PASSWORD" \
                     -e "SELECT 1" >/dev/null 2>&1; do
                echo "Waiting for DB..."
                sleep 3
              done

              echo "=== Starting application ==="

              exec java \
                -Dspring.datasource.url=jdbc:mysql://$MYSQL_HOST:$MYSQL_PORT/$MYSQL_DATABASE \
                -Dspring.datasource.username=$MYSQL_USER \
                -Dspring.datasource.password=$MYSQL_PASSWORD \
                -jar /usr/src/app/app.jar

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1.5Gi"

          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
